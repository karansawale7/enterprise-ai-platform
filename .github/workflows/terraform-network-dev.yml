name: Terraform Network Dev

on:
  pull_request:
    branches:
      - main
    paths:
      - "terraform/modules/network/**"
      - "terraform/envs/dev/network/**"
      - ".github/workflows/terraform-network-dev.yml"

  push:
    branches:
      - main
    paths:
      - "terraform/modules/network/**"
      - "terraform/envs/dev/network/**"
      - ".github/workflows/terraform-network-dev.yml"

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.14.1"
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_WORKING_DIR: terraform/envs/dev/network

jobs:
  terraform-check:
    name: Terraform Format Validate Plan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

  terraform-apply:
    name: Terraform Apply Dev Network
    runs-on: ubuntu-latest
    needs: terraform-check

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    environment:
      name: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve
